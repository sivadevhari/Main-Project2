<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0984e3, #00b894);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="card bg-white">
        <h2 class="text-center mb-4">Logout Confirmation</h2>

        <div class="alert alert-info">
            <strong>Are you sure you want to logout?</strong>
        </div>

        <p class="text-center mb-4 text-muted">
            You will be logged out and redirected to the login page.
        </p>

        <div class="d-grid gap-2">
            <a href="/logout_confirm" class="btn btn-danger">Yes, Logout</a>
            <a href="/predict_tool" class="btn btn-outline-primary">Cancel</a>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="btn btn-outline-light btn-sm">
                GO BACK
            </a>
        </div>
    </div>
</body>
</html>
