<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELLIGENT DISEASE PREDICTION SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;

        }

        .transparent-navbar {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.25);

            padding: 14px 40px;
        }

        .glass-card {
            background: rgb(255, 255, 255);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 600px;
            margin: auto;
            transition: transform 0.3s ease;
            color: #2d3436;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .glass-card h2 {
            color: #2d3436;
            font-weight: 700;
        }

        .glass-card .form-label {
            color: #2d3436;
            font-weight: 600;
        }

        .glass-card .form-control {
            color: #2d3436;
        }

        .glass-card .form-control::placeholder {
            color: #95a5a6;
        }

        .brand-logo {
            font-weight: 700;
            letter-spacing: -1px;
            color: #1e3c72;
            font-size: 2.5rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 12px 20px;
            border: lightgray solid 2px;
            font-size: 1rem;
        }

        .btn-predict {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn-predict:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            transform: scale(1.02);
        }

        .subtitle {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 15px 30px;
        }

        .navbar-custom .navbar-brand {
            color: #0984e3 !important;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .navbar-custom .nav-link {
            color: #2d3436 !important;
            font-weight: 500;
            margin-left: 20px;
            transition: all 0.3s ease;
        }

        .navbar-custom .nav-link:hover {
            color: #0984e3 !important;
        }

        .logout-btn {
            background: #0984e3;
            color: white !important;
            padding: 8px 20px !important;
            border-radius: 20px;
            margin-left: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: #0770c9;
            transform: scale(1.05);
        }

        .admin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white !important;
            padding: 8px 20px !important;
            border-radius: 20px;
            margin-left: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="container mt-5">
            <div class="glass-card text-center">
                <h1 class="brand-logo mb-2">INTELLIGENT DISEASE</h1>
                <h2 class="fw-bold mb-3">PREDICTION SYSTEM</h2>
                <p class="subtitle">
                    Enter your symptoms below. Our intelligent system will analyze the patterns to provide a preliminary
                    assessment.
                </p>

                <form action="/predict" method="POST">
                    <div class="mb-3 text-start">
                        <label class="form-label ms-1">Describe how you feel</label>
                        <input type="text" name="symptoms" class="form-control"
                            placeholder="e.g. high fever, joint pain, skin rash" required>
                    </div>
                    <button type="submit" class="btn btn-predict">
                        Analyze Symptoms
                    </button>
                </form>

                <div class="mt-4 small text-dark opacity-75">
                    * This is for informational purposes and not a medical diagnosis.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
