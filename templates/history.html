<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History - INTELLIGENT DISEASE PREDICTION SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
        }
        .glass-card {
            background: rgb(255, 255, 255);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 900px;
            margin: auto;
            margin-top: 50px;
            transition: transform 0.3s ease;
            color: #2d3436;
        }
        .glass-card:hover {
            transform: translateY(-5px);
        }
        .glass-card h2 {
            color: #2d3436;
            font-weight: 700;
        }
        .table {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            color: #2d3436;
        }
        .table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: #f8f9fa;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            transform: scale(1.02);
        }
    </style>
</head>
<body style="padding-top: 70px;">
    {% include 'navbar.html' %}
    <div class="container mt-5">
        <div class="glass-card">
            <h2 class="fw-bold mb-4">Prediction History</h2>
            {% if diagnostics %}
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Symptoms</th>
                            <th>Disease</th>
                            <th>Accuracy</th>
                            <th>Download</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for diag in diagnostics %}
                        <tr>
                            <td>{{ diag.timestamp }}</td>
                            <td>{{ diag.symptoms }}</td>
                            <td>{{ diag.disease }}</td>
                            <td>{{ diag.accuracy }}</td>
                            <td>
                                <a href="/download_report/{{ diag.id }}" class="btn btn-sm btn-primary">Download</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <p>No previous predictions found.</p>
            {% endif %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
